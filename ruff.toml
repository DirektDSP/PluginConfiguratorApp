# Ruff configuration for PluginConfiguratorApp
# https://docs.astral.sh/ruff/

target-version = "py312"
line-length = 100

[lint]
# Enable recommended rules
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate
    "PL",     # pylint
    "TRY",    # tryceratops
    "FLY",    # flynt
    "PERF",   # perflint
    "RUF",    # ruff-specific rules
]

# Ignore specific rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "PLR0913",  # too many arguments
    "PLR2004",  # magic value comparison
    "TRY003",  # long exception messages
    "SIM108",  # prefer ternary operator
    "PERF203",  # try-except in loop
    "ARG001",  # unused function argument (for Qt callbacks)
    "ARG002",  # unused method argument (for Qt callbacks)
    "B904",    # raise from err (requires exception chain refactoring)
    "TRY300",  # return in try instead of else (acceptable for this codebase)
    "PLW2901",  # loop variable overwritten (acceptable for transform loops)
    "PTH",    # pathlib migration (deferred for Phase 2)
    "PERF401",  # list comprehension suggestion (for loops acceptable)
    "PLR0915",  # too many statements (UI files are naturally complex)
    "E722",    # bare except (legacy code, fix in Phase 2)
]

# Allow autofix for enabled rules
fixable = ["ALL"]
unfixable = []

[format]
# Use double quotes for strings
quote-style = "double"

# Use spaces for indentation
indent-style = "space"

# Like Black, respect magic trailing commas
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings
docstring-code-format = true

[lint.per-file-ignores]
# Ignore specific rules in test files
"tests/**/*.py" = [
    "ARG",     # Unused arguments are common in tests
    "PLR0915", # Too many statements
    "S101",    # Use of assert
]

# Ignore specific rules in UI files
"src/ui/**/*.py" = [
    "ARG",     # Qt callbacks often have unused args
]

[lint.isort]
known-first-party = ["core", "ui", "resources"]