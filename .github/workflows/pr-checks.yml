name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: repo.owner,
              repo: repo.repo,
              pull_number: pr.number
            });

            const rustFiles = files.filter(f => f.filename.endsWith('.rs')).length;
            const tomlFiles = files.filter(f => f.filename.endsWith('.toml')).length;
            const docFiles = files.filter(f => f.filename.endsWith('.md')).length;

            const comment = `## PR Summary

            ### Changes
            - **Files Changed**: ${files.length}
            - **Rust**: ${rustFiles}
            - **TOML**: ${tomlFiles}
            - **Docs**: ${docFiles}

            CI will run: build (Linux/macOS/Windows), clippy, rustfmt.`;

            await github.rest.issues.createComment({
              issue_number: pr.number,
              owner: repo.owner,
              repo: repo.repo,
              body: comment
            });

  check-conflicts:
    name: Check Merge Conflicts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          git checkout origin/main
          git merge ${{ github.ref }} --no-commit --no-ff 2>&1 | grep -i "conflict" && {
            echo "Merge conflicts detected"
            git merge --abort
            exit 1
          } || echo "No merge conflicts"
          git merge --abort || true
