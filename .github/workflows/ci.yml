name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

# Global defaults
defaults:
  run:
    shell: bash

jobs:
  # Detect what changes were made and set outputs
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python-changed: ${{ steps.changes.outputs.python }}
      tests-changed: ${{ steps.changes.outputs.tests }}
      docs-changed: ${{ steps.changes.outputs.docs }}
      deps-changed: ${{ steps.changes.outputs.deps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - '**/*.py'
            tests:
              - 'tests/**/*.py'
              - 'tests/**'
            docs:
              - '**.md'
              - 'docs/**'
            deps:
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'uv.lock'
              - 'setup.py'
  
  # Run Python linting only when Python files change
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - name: Install dependencies and dev tools
        run: |
          uv sync
          uv add --dev ruff black isort
      
      - name: Run ruff linter
        run: uv run ruff check src/ tests/ --output-format=github
      
      - name: Run ruff formatting check
        run: uv run ruff format --check src/ tests/
      
      - name: Run isort check
        run: uv run isort --check-only --diff src/ tests/
  
  # Run type checking only when Python files change
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - name: Install dependencies
        run: uv sync
      
      - name: Install mypy
        run: uv add --dev mypy
      
      - name: Run mypy type checking
        run: uv run mypy src/ --ignore-missing-imports --no-error-summary
  
  # Run tests when Python or test files change
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python-changed == 'true' || needs.detect-changes.outputs.tests-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - name: Install Qt runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1-mesa libxkbcommon0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install test dependencies
        run: uv add --dev pytest pytest-qt pytest-cov pytest-html

      - name: Run tests with coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --html=pytest-report.html \
            --self-contained-html \
            --verbose
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: |
            pytest-report.html
            htmlcov/
          retention-days: 30
  
  # Security audit when dependencies change
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.deps-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - name: Install dependencies
        run: uv sync
      
      - name: Install safety
        run: uv add --dev safety
      
      - name: Run security audit
        run: uv run safety check --full-report || true
      
      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --desc 2>&1 || true
  
  # Markdown linting when docs change
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/
            !.venv/
  
  # Always run check to ensure CI integrity
  integrity-check:
    name: CI Integrity Check
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          # Determine which jobs should have run
          if [ "${{ needs.detect-changes.outputs.python-changed }}" == "true" ]; then
            echo "Expected jobs: lint, typecheck, test"
          elif [ "${{ needs.detect-changes.outputs.tests-changed }}" == "true" ]; then
            echo "Expected jobs: test"
          elif [ "${{ needs.detect-changes.outputs.docs-changed }}" == "true" ]; then
            echo "Expected jobs: markdown-lint"
          elif [ "${{ needs.detect-changes.outputs.deps-changed }}" == "true" ]; then
            echo "Expected jobs: security"
          else
            echo "No files changed that require CI checks"
          fi
          echo "CI pipeline completed successfully"